<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <!-- Adaptive icon safe zone: 66x66 centered (21px inset on each side) -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="50%" style="stop-color:#283593"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EF5350"/>
      <stop offset="100%" style="stop-color:#C62828"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="108" height="108" fill="url(#bg)" rx="0"/>

  <!-- Diagonal split line -->
  <line x1="22" y1="86" x2="86" y2="22" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- P1 controller (top-left area, red) -->
  <g transform="translate(35, 34)">
    <!-- Controller body -->
    <rect x="-12" y="-6" width="24" height="14" rx="4" fill="url(#glow1)" opacity="0.9"/>
    <!-- D-pad -->
    <rect x="-9" y="-2" width="3" height="7" rx="0.5" fill="#fff" opacity="0.8"/>
    <rect x="-11" y="0" width="7" height="3" rx="0.5" fill="#fff" opacity="0.8"/>
    <!-- Buttons -->
    <circle cx="6" cy="-1" r="1.5" fill="#FFD54F"/>
    <circle cx="9" cy="1.5" r="1.5" fill="#66BB6A"/>
    <circle cx="6" cy="4" r="1.5" fill="#fff" opacity="0.6"/>
  </g>

  <!-- P2 controller (bottom-right area, blue) -->
  <g transform="translate(73, 74)">
    <!-- Controller body -->
    <rect x="-12" y="-6" width="24" height="14" rx="4" fill="url(#glow2)" opacity="0.9"/>
    <!-- D-pad -->
    <rect x="-9" y="-2" width="3" height="7" rx="0.5" fill="#fff" opacity="0.8"/>
    <rect x="-11" y="0" width="7" height="3" rx="0.5" fill="#fff" opacity="0.8"/>
    <!-- Buttons -->
    <circle cx="6" cy="-1" r="1.5" fill="#FFD54F"/>
    <circle cx="9" cy="1.5" r="1.5" fill="#E040FB"/>
    <circle cx="6" cy="4" r="1.5" fill="#fff" opacity="0.6"/>
  </g>

  <!-- "2P" text in center -->
  <text x="54" y="59" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="22" fill="#fff" opacity="0.95">2P</text>

  <!-- Decorative game elements -->
  <!-- Small ball (pong) -->
  <circle cx="54" cy="38" r="3" fill="#FFD54F" opacity="0.7"/>
  <!-- Small star (star clash) -->
  <polygon points="54,68 55.5,71 59,71.5 56.5,73.5 57,77 54,75.5 51,77 51.5,73.5 49,71.5 52.5,71" fill="#FFD54F" opacity="0.5" transform="scale(0.7) translate(23,28)"/>

  <!-- Sparkle dots -->
  <circle cx="30" cy="50" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="78" cy="58" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="44" cy="72" r="1.2" fill="#fff" opacity="0.3"/>
  <circle cx="64" cy="36" r="1.2" fill="#fff" opacity="0.3"/>
</svg>
